<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Image portfolio gallery">
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
  <title>배찬협</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Great+Vibes&family=Jua&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="hero">
    <h1><span class="hero-name">Bae Chan Hyeop</span></h1>
  </header>

  <main class="container">
    <section class="toolbar" aria-label="Gallery filters">
      <button class="chip active" data-filter="all">전체</button>
      <button class="chip" data-filter="4계절">4계절</button>
      <button class="chip" data-filter="화이트데이">화이트데이</button>
      <button class="chip" data-filter="동양풍">동양풍</button>
      <button class="chip" data-filter="올림포스">올림포스</button>
      <button class="chip" data-filter="이집트">이집트</button>
    </section>

    <section id="gallery" class="gallery" aria-label="Portfolio images">
      <article class="card" data-category="생일" data-lightbox-title="test 테스트" data-lightbox-text="7월 31일">
        <img src="images/White_Day_1.png" alt="temp" loading="lazy">
        <div class="card-body">
          <h2>생일</h2>
        </div>
      </article>

      <article class="card" data-category="4계절" data-lightbox-title="봄" data-lightbox-text="">

          <h2>봄</h2>

        <div class="card-body">
          <h2>화이트데이</h2>

  </main>

  <div id="lightbox" class="lightbox" aria-hidden="true">
    <button id="closeLightbox" class="lightbox-close" aria-label="Close preview">X</button>
    <div class="lightbox-content">
      <img id="lightboxImage" alt="">
      <p id="lightboxCaption"></p>
      <p id="lightboxSubtext"></p>
    </div>
  </div>

  <footer class="footer">
    <div class="container">
      <p>&copy; <span id="year"></span> </p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
