<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Image portfolio gallery">
  <title>배찬협</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="hero">
    <div class="container">
      <h1>배찬협</h1>
      <p>찬협아, 생일 축하해!</p>
    </div>
  </header>

  <main class="container">
    <section class="toolbar" aria-label="Gallery filters">
      <button class="chip active" data-filter="all">전채</button>
      <button class="chip" data-filter="4계절">4계절</button>
      <button class="chip" data-filter="동양풍">동양풍</button>
      <button class="chip" data-filter="올림포스">올림포스</button>
      <button class="chip" data-filter="이집트">이집트</button>
    </section>

    <section id="gallery" class="gallery" aria-label="Portfolio images">
      <article class="card" data-category="생일">
        <img src="https://picsum.photos/id/1018/900/700" alt="Misty mountain range at sunrise" loading="lazy">
        <div class="card-body">
          <h2>생일</h2>
          <p>7월 31일</p>
        </div>
      </article>

      <article class="card" data-category="4계절">
        <img src="images/Season_Spring.png" alt="City skyline at blue hour" loading="lazy">
        <div class="card-body">
          <h2>봄</h2>
          <p></p>
        </div>
      </article>

      <article class="card" data-category="4계절">
        <img src="images/Season_Summer.png" alt="Portrait of a person in natural light" loading="lazy">
        <div class="card-body">
          <h2>여름</h2>
          <p></p>
        </div>
      </article>

      <article class="card" data-category="4계절">
        <img src="images/Season_Fall.png" alt="Forest trail with soft sunlight" loading="lazy">
        <div class="card-body">
          <h2>가을</h2>
          <p></p>
        </div>
      </article>

      <article class="card" data-category="4계절">
        <img src="images/Season_Winter.png" alt="Street crossing with motion blur" loading="lazy">
        <div class="card-body">
          <h2>겨울</h2>
          <p></p>
        </div>
      </article>

      <article class="card" data-category="올림포스">
        <img src="images/Olympus_Aphrodite.png" alt="Person walking along a shoreline" loading="lazy">
        <div class="card-body">
          <h2>아프로디테</h2>
          <p></p>
        </div>
      </article>
    </section>
  </main>

  <div id="lightbox" class="lightbox" aria-hidden="true">
    <button id="closeLightbox" class="lightbox-close" aria-label="Close preview">X</button>
    <img id="lightboxImage" alt="">
    <p id="lightboxCaption"></p>
  </div>

  <footer class="footer">
    <div class="container">
      <p>&copy; <span id="year"></span> My Image Portfolio</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
